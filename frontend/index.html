<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dealer Operations AI</title>
    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Marked.js for Markdown parsing -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="app-layout">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <img src="/static/emamiLogoTransparent.png" alt="Emami Logo" class="logo-img">
            </div>
            
            <div class="sidebar-section">
                <label for="apiKeyInput" class="section-label">API Key</label>
                <input type="password" id="apiKeyInput" placeholder="Enter API Key...">
            </div>

            <div class="sidebar-section">
                <label for="modelSelect" class="section-label">LLM Model</label>
                <select id="modelSelect">
                    <option value="gemini-1.5-flash">Loading models...</option>
                </select>
                <button id="refreshModelsBtn" class="secondary-btn" style="margin-top: 8px; width: 100%; font-size: 0.8rem;">Fetch Available Models</button>
            </div>

            <div class="sidebar-section hierarchy-selectors">
                <label for="bdoSelect" class="section-label">Select BDO</label>
                <select id="bdoSelect" onchange="fetchMetrics()">
                    <option value="">Select BDO...</option>
                    <!-- Populated by JS -->
                </select>
            </div>

            <div style="flex-grow: 1;"></div>
            

        </aside>

        <!-- Main Content -->
        <div class="main-content">
            <!-- Header -->
            <header class="topbar">
                <div class="title-area">
                    <h1>Dealer Intelligence AI</h1>
                    <p>Premium Operations & Strategy Assistant</p>
                </div>
                
                <div class="kpi-area" id="headerMetrics">
                    <!-- Metrics populated via JS -->
                </div>
            </header>

            <!-- Main Chat Area -->
            <main class="chat-container">
                <div class="chat-history" id="chatHistory">
                    <!-- Suggestion Chips (Initially visible) -->
                    <div class="suggestions" id="suggestionsContainer">
                        <p class="suggestions-title">Try asking:</p>
                        <div class="suggestion-chips">
                            <button onclick="submitSuggested('Give me my top 5 BDO actions for today')">Top 5 actions</button>
                            <button onclick="submitSuggested('Which contracts are expiring soon?')">Expiring contracts</button>
                            <button onclick="submitSuggested('Which material is arriving today for which customer?')">Deliveries today</button>
                            <button onclick="submitSuggested('Which dealer has high pending quantity?')">Pending qty</button>
                            <button onclick="submitSuggested('Who should I follow up on for pending payments?')">Pending payments</button>
                            <button onclick="submitSuggested('Which dealers should I call to create a new sauda?')">New sauda</button>
                            <button onclick="submitSuggested('What basic rate should I use for sunflower oil?')">Pricing</button>
                            <button onclick="submitSuggested('Which contracts are aging and should be prioritized?')">Aging contracts</button>
                        </div>
                    </div>
                    <!-- Chat messages will be appended here -->
                </div>

                <!-- Input Area -->
                <div class="input-container">
                    <form id="chatForm" class="chat-form">
                        <textarea id="userInput" rows="1" placeholder="Ask about dealers, sales, or payments..." required></textarea>
                        <button type="submit" id="sendBtn" title="Send">
                            <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
                        </button>
                    </form>
                </div>
            </main>
        </div>
    </div>
    <script src="/static/app.js"></script>
</body>
</html>
