<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dealer Operations AI</title>
    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Marked.js for Markdown parsing -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="app-layout">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <img src="/static/logo.png" alt="Emami Logo" class="logo-img">
            </div>
            
            <div class="sidebar-section">
                <label for="apiKeyInput" class="section-label">Groq API Key</label>
                <input type="password" id="apiKeyInput" placeholder="Enter API Key...">
            </div>

            <div class="sidebar-section hierarchy-selectors">
                <label for="roleSelect" class="section-label">Select Role</label>
                <select id="roleSelect" onchange="handleRoleChange()">
                    <option value="National Sales Manager">National Sales Manager</option>
                    <option value="Zonal Sales Manager">Zonal Sales Manager</option>
                    <option value="BDO">Business Development Officer (BDO)</option>
                </select>
                <select id="zoneSelect" style="display: none;" onchange="handleZoneChange()">
                    <option value="">Select Zone...</option>
                    <option value="East">East Zone</option>
                    <option value="West">West Zone</option>
                    <option value="North">North Zone</option>
                    <option value="South">South Zone</option>
                </select>
                <select id="bdoSelect" style="display: none;" onchange="fetchMetrics()">
                    <option value="">Select BDO...</option>
                    <!-- Populated by JS -->
                </select>
            </div>

            <div style="flex-grow: 1;"></div>
            
            <div class="sidebar-section">
                <button id="batchTestBtn" onclick="runBatchTest()" class="batch-test-btn">
                    <svg viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round" style="margin-right: 8px;"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>
                    Run Batch Tests
                </button>
            </div>
        </aside>

        <!-- Main Content -->
        <div class="main-content">
            <!-- Header -->
            <header class="topbar">
                <div class="title-area">
                    <h1>Dealer Intelligence AI</h1>
                    <p>Premium Operations & Strategy Assistant</p>
                </div>
                
                <div class="kpi-area" id="headerMetrics">
                    <!-- Metrics populated via JS -->
                </div>
            </header>

            <!-- Main Chat Area -->
            <main class="chat-container">
                <div class="chat-history" id="chatHistory">
                    <!-- Suggestion Chips (Initially visible) -->
                    <div class="suggestions" id="suggestionsContainer">
                        <p class="suggestions-title">Try asking:</p>
                        <div class="suggestion-chips">
                            <button onclick="submitSuggested('Which high-value dealers are currently dormant?')">Top high-value dormant dealers?</button>
                            <button onclick="submitSuggested('Who are the dealers in Maharashtra with highest outstanding?')">Highest outstanding in Maharashtra?</button>
                            <button onclick="submitSuggested('Which orders have low dispatch ratios?')">SKUs with low fulfillment?</button>
                        </div>
                    </div>
                    <!-- Chat messages will be appended here -->
                </div>

                <!-- Input Area -->
                <div class="input-container">
                    <form id="chatForm" class="chat-form">
                        <textarea id="userInput" rows="1" placeholder="Ask about dealers, sales, or payments..." required></textarea>
                        <button type="submit" id="sendBtn" title="Send">
                            <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
                        </button>
                    </form>
                </div>
            </main>
        </div>
    </div>
    <script src="/static/app.js"></script>
</body>
</html>
